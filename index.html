<!DOCTYPE html>
<html>
<head>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
</head>
<body></body>
<script>
    // jsPsych全体の設定
    const jsPsych = initJsPsych({
        on_finish: function() {
            const raw_data = jsPsych.data.get()
                .filterCustom(function(trial){ return trial.variable === 'a' || trial.variable === 'r' || trial.variable === 'setting'; })
                .ignore('stimulus')
                .ignore('trial_type')
                .ignore('internal_node_id')
                .ignore('time_elapsed')
                .ignore('current_reward')
                .ignore('rt')
            const data_to_send = raw_data.csv(); 

            // ========================================================================================================================
            // データの送信先(GoogleForm)の設定
            const form_url = "https://docs.google.com/forms/d/e/1FAIpQLSeu9c1-9WMR51VG_kq1KZs78oxOY5XsME85e8D0PaXgpYqlYA/formResponse";
            const entry_id = "entry.1469418369";
            // ========================================================================================================================

            const formData = new FormData();
            formData.append(entry_id, data_to_send);
            fetch(form_url, { method: "POST", mode: "no-cors", body: formData })
            .then(() => { alert("送信が完了しました"); })
            .catch((err) => { alert("送信エラーが発生しました: " + err); });
        }
    });

    // ===========================================================
    // 1. SETTING
    // ===========================================================
    const all_schedules = [
        {name: "A_1",
            A: [1, 0, 1, 1, 1],
            B: [0, 1, 0, 0, 1]},
        {name: "A_2",
            A: [0, 1, 1, 1, 1],
            B: [1, 0, 0, 1, 0]},
        {name: "A_3",
            A: [1, 1, 1, 0, 1],
            B: [0, 1, 0, 1, 0]},
        {name: "B_1",
            A: [0, 1, 0, 0, 1],
            B: [1, 0, 1, 1, 1]},
        {name: "B_2",
            A: [0, 1, 1, 0, 0],
            B: [0, 1, 1, 1, 1]},
        {name: "B_3",
            A: [0, 1, 0, 0, 1],
            B: [1, 0, 1, 1, 1]}
    ];
    const selected_pattern = jsPsych.randomization.sampleWithoutReplacement(all_schedules, 1)[0];
    const reward_schedules = { A: selected_pattern.A, B: selected_pattern.B };
    let trial_count = 0;

    // ===========================================================
    // 2. TRIALS
    // ===========================================================

    // ============
    // 2.1. 初期画面
    // ============
    const start_screen = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: 'キーを押したら課題を開始します',
        data: { variable: 'setting', reward: selected_pattern.name }
    };

    // ============
    // 2.2. 選択画面
    // ============
    const trial_choice = {
        type: jsPsychHtmlButtonResponse,
        stimulus: '好きな方を選んでください',
        choices: ['A', 'B'],
        data: { variable: 'a' },
        on_finish: function(data) {
            const res = Number(data.response);
            data.current_reward = (res === 0) ? reward_schedules.A[trial_count] : reward_schedules.B[trial_count];
        }
    };

    // ============
    // 2.3. 結果画面
    // ============
    const trial_feedback = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: function() {
            const choice_data = jsPsych.data.get().filter({variable: 'a'}).last(1).values()[0];
            const result = choice_data.current_reward;
            return (result === 1) ? '<h1 style="color:red;">当たり！</h1>' : '<h1 style="color:blue;">外れ...</h1>';
        },
        choices: "NO_KEYS",
        trial_duration: 1000,
        on_finish: function(data) {
            const choice_data = jsPsych.data.get().filter({variable: 'a'}).last(1).values()[0];
            data.reward = choice_data.current_reward;
            data.variable = 'r';
            trial_count++; 
        }
    };

    // ============
    // 2.4. 終了画面
    // ============
    const end_screen = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: 'キーを押したらデータを送信します',
        data: { variable: 'ex' }
    };

    // ===========================================================
    // 3. TIMELINE
    // ===========================================================
    const timeline = [
        start_screen,
        {
            timeline: [trial_choice, trial_feedback],
            repetitions: 5
        },
        end_screen,
    ];

    // ===========================================================
    // 4. EXECUTION
    // ===========================================================
    jsPsych.run(timeline);

</script>
</html>
